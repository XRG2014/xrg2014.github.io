<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      line-height: 1.6;
    }
    /* Ensure proper styling for lists */
    ul, ol {
      margin-left: 20px;
      padding-left: 20px;
    }
    ul li {
      list-style-type: disc; /* Default bullet style */
    }
    ol li {
      list-style-type: decimal; /* Default numbered style */
    }
    pre {
      background: #f4f4f4;
      padding: 10px;
      overflow-x: auto;
    }
    code {
      background: #f4f4f4;
      padding: 2px 4px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <h1 align="center"><b> About this website </b></h1>
  <hr>
  <p>This website is made using <a href="https://porkbun.com" target="_blank">Porkbun</a>, <a href="https://github.io" target="_blank">Github Pages</a> with <a href="https://jekyllrb.com" target="_blank">Jekyll</a>, and more/soon to be more.</p>
  <p>It hosts the <a href="https://xrg2014.github.io/triforce-freaks" target="_blank">Triforce Freaks website</a>.</p>
  <p id="status">Checking web-games link ...</p>
    <script>
    // URL of the GitHub Pages link to check
    const githubUrl = 'https://xrg2014.github.io/web-games/';

    // Function to check the URL status
    function checkLinkStatus(url) {
      fetch(url)
        .then(response => {
          // If the response is not ok, it means there's an error
          if (!response.ok) {
            throw new Error(`Error: ${response.statusText}`);
          }
          // If the response is ok, display a success message
          document.getElementById('status').textContent = 'This website also has <a href="https://xrg2014.github.io/web-games" target="_blank">games</a> on it!';
        })
        .catch(error => {
          document.getElementById('status').remove();
        });
    }

    // Check the link status
    checkLinkStatus(githubUrl);
  </script>
  <h1 align="center"><b> About me </b></h1>
  <hr>
  <div id="output">Loading ...</div>

  <script>
    // URL of the Markdown file
    const markdownUrl = 'https://raw.githubusercontent.com/XRG2014/XRG2014/refs/heads/main/README.md';

    // Fetch the Markdown file from the URL
    fetch(markdownUrl)
      .then(response => {
        if (!response.ok) {
          throw new Error(`Failed to fetch Markdown file: ${response.statusText}`);
        }
        return response.text();
      })
      .then(markdown => {
        // Convert Markdown to HTML using Marked.js
        const htmlContent = marked.parse(markdown);

        // Inject the converted HTML into the output div
        document.getElementById('output').innerHTML = htmlContent;
      })
      .catch(error => {
        // Display an error message if something goes wrong
        document.getElementById('output').textContent = `Error: ${error.message}`;
      });
  </script>
</body>
</html>
