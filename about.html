<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      line-height: 1.6;
    }
    #output {
      border: 1px solid #ccc;
      padding: 20px;
      background: #f9f9f9;
    }
    ul, ol {
      margin-left: 20px;
      padding-left: 20px;
      list-style: initial;
    }
    ul li {
      list-style-type: disc; /* Default bullet style */
    }
    ol li {
      list-style-type: decimal; /* Default numbered style */
    }
    pre {
      background: #f4f4f4;
      padding: 10px;
      overflow-x: auto;
    }
    code {
      background: #f4f4f4;
      padding: 2px 4px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <h1 align="center"> About Me </h1>
  <div id="output">Loading...</div>

  <script>
    // URL of the Markdown file
    const markdownUrl = 'https://raw.githubusercontent.com/XRG2014/XRG2014/refs/heads/main/README.md';

    // Set custom renderer for list items to avoid ">>"
    const renderer = new marked.Renderer();
    renderer.listitem = function(text) {
      return `<li style="list-style-type: disc;">${text}</li>`;
    };

    marked.setOptions({
      renderer: renderer
    });

    // Fetch the Markdown file from the URL
    fetch(markdownUrl)
      .then(response => {
        if (!response.ok) {
          throw new Error(`Failed to fetch Markdown file: ${response.statusText}`);
        }
        return response.text();
      })
      .then(markdown => {
        // Convert Markdown to HTML using Marked.js
        const htmlContent = marked.parse(markdown);

        // Inject the converted HTML into the output div
        document.getElementById('output').innerHTML = htmlContent;
      })
      .catch(error => {
        // Display an error message if something goes wrong
        document.getElementById('output').textContent = `Error: ${error.message}`;
      });
  </script>
</body>
</html>
