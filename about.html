<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body>
  <h1 align="center"><b> About Me </b></h1>
  <div id="output">Loading...</div>

  <script>
    // URL of the Markdown file
    const markdownUrl = 'https://raw.githubusercontent.com/XRG2014/XRG2014/refs/heads/main/README.md';

    // Function to replace bullet points in Markdown with custom symbols
    function replaceBulletPoints(markdown) {
      // Replace `- ` or `* ` with a custom symbol, e.g., "→"
      return markdown.replace(/(^|\n)[*-]\s/g, '$1o ');
    }

    // Fetch the Markdown file from the URL
    fetch(markdownUrl)
      .then(response => {
        if (!response.ok) {
          throw new Error(`Failed to fetch Markdown file: ${response.statusText}`);
        }
        return response.text();
      })
      .then(markdown => {
        // Convert Markdown to HTML using Marked.js
        const htmlContent = marked.parse(markdown);

        // Inject the converted HTML into the output div
        document.getElementById('output').innerHTML = htmlContent;
      })
      .catch(error => {
        // Display an error message if something goes wrong
        document.getElementById('output').textContent = `Error: ${error.message}`;
      });
  </script>
</body>
</html>
